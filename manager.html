<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manager Dashboard - InCar Detailing</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <h1>Manager Dashboard</h1>
    <h3>Weekly Timesheet Records</h3>

    <table>
        <thead>
            <tr>
                <th>Employee Name</th>
                <th>Action (In/Out)</th>
                <th>Date & Time</th>
            </tr>
        </thead>
        <tbody id="logTableBody">
            </tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // PASTE YOUR EXACT SAME FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadLogs() {
            const q = query(collection(db, "timeLogs"), orderBy("time", "desc"));
            const querySnapshot = await getDocs(q);
            
            const tableBody = document.getElementById("logTableBody");
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const row = `<tr>
                                <td>${data.employee}</td>
                                <td>${data.action}</td>
                                <td>${data.time}</td>
                             </tr>`;
                tableBody.innerHTML += row;
            });
        }

        loadLogs();
    </script>
</body>
</html>
