<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manager Dashboard - InCar Detailing</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <h1>Manager Dashboard</h1>
    <h3>Weekly Timesheet Records</h3>

    <table>
        <thead>
            <tr>
                <th>Employee Name</th>
                <th>Action (In/Out)</th>
                <th>Date & Time</th>
            </tr>
        </thead>
        <tbody id="logTableBody">
            </tbody>
    </table>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // PASTE YOUR EXACT SAME FIREBASE CONFIG HERE
        const firebaseConfig = {
    apiKey: "AIzaSyAiplwGT8bfv-lXp8T7UX0_GhCFpnBzxH4",
    authDomain: "incar-detailing.firebaseapp.com",
    projectId: "incar-detailing",
    storageBucket: "incar-detailing.firebasestorage.app",
    messagingSenderId: "323775979442",
    appId: "1:323775979442:web:1573ce4526d13559718eab"
  };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadLogs() {
            const q = query(collection(db, "timeLogs"), orderBy("time", "desc"));
            const querySnapshot = await getDocs(q);
            
            const tableBody = document.getElementById("logTableBody");
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const row = `<tr>
                                <td>${data.employee}</td>
                                <td>${data.action}</td>
                                <td>${data.time}</td>
                             </tr>`;
                tableBody.innerHTML += row;
            });
        }

        loadLogs();
    </script>
</body>
</html>
